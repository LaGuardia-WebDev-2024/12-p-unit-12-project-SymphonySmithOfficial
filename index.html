<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Project</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f0f4ff;
        padding: 20px;
      }

      h1 {
        text-align: center;
      }

      form {
        margin-bottom: 20px;
        padding: 15px;
        background: #ffffff;
        border-radius: 10px;
        box-shadow: 0 3px 8px rgba(0,0,0,0.1);
      }

      label {
        font-weight: bold;
        display: block;
        margin-bottom: 10px;
      }

      select {
        padding: 8px;
        border-radius: 6px;
        border: 1px solid #ccc;
        width: 100%;
      }

      button {
        margin-top: 10px;
        padding: 10px 15px;
        background: #4b6cff;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      button:hover {
        background: #3a52d1;
      }

      /* Standard Animations */
      .fade {
        animation: fadeIn 1.2s forwards;
      }

      .slide {
        animation: slideIn 1s forwards;
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes slideIn {
        from { transform: translateY(30px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      /* Custom Animation */
      .spin {
        animation: spin 1.5s linear infinite;
      }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      /* Images */
      .image-row {
        display: flex;
        gap: 15px;
        justify-content: center;
        margin-top: 20px;
      }

      .image-row img {
        width: 150px;
        height: 150px;
        border-radius: 10px;
        border: 2px solid #ccc;
      }

      #animation-result {
        margin-top: 10px;
        padding: 10px;
        background: #eef2ff;
        border-radius: 8px;
      }
    </style>
  </head>

  <body>
    <h1>Quiz About Me</h1>
    <hr />

    <!-- Movie Question -->
    <form id="movie-form">
      <label>
        🎥 What is my favorite movie?
        <select id="movie-answer">
          <option value="movie1">The Lion King</option>
          <option value="movie2">Spider-Man: Into the Spider-Verse</option>
          <option value="movie3">The Incredibles</option>
          <option value="movie4">Finding Nemo</option>
        </select>
      </label>
      <button type="submit">Check Movie Answer</button>
    </form>
    <div id="movie-result"><p id="movie-text"></p></div>

    <hr />

    <!-- Book Question -->
    <form id="book-form">
      <label>
        📖 What is my favorite book?
        <select id="book-answer">
          <option value="book1">Harry Potter and the Sorcerer's Stone</option>
          <option value="book2">Diary of a Wimpy Kid</option>
          <option value="book3">The Hunger Games</option>
          <option value="book4">Wonder</option>
        </select>
      </label>
      <button type="submit">Check Book Answer</button>
    </form>
    <div id="book-result"><p id="book-text"></p></div>

    <hr />

    <!-- Standard Animation -->
    <form id="standard-form">
      <label>
        ✨ Choose a Standard Animation:
        <select id="standard-animation">
          <option value="">-- Select Animation --</option>
          <option value="fade">Fade In</option>
          <option value="slide">Slide In</option>
        </select>
      </label>
      <button type="submit">Apply Standard Animation</button>
    </form>

    <!-- Custom Animation -->
    <form id="custom-form">
      <label>
        🎨 Choose a Custom Animation:
        <select id="custom-animation">
          <option value="">-- Select Animation --</option>
          <option value="spin">Spin</option>
        </select>
      </label>
      <button type="submit">Apply Custom Animation</button>
    </form>

    <!-- Three Images -->
    <div class="image-row" id="image-row">
      <img src="https://c.tenor.com/mElk6R9ZytIAAAAC/hi-sisters-hey.gif" />
      <img src="https://c.tenor.com/Ui4gcz7et38AAAAC/usher-yeah.gif" />
      <img src="https://i.pinimg.com/originals/6c/3a/e9/6c3ae9fbc5be1f92c6d1ddb3a8472bf2.png" />
    </div>

    <!-- Additional Dropdown -->
    <form id="theme-form">
      <label>
        🎨 Choose a Theme:
        <select id="theme-select">
          <option value="">-- Select Theme --</option>
          <option value="bright">Bright</option>
          <option value="calm">Calm</option>
          <option value="fun">Fun</option>
        </select>
      </label>
      <button type="submit">Apply Theme</button>
    </form>

    <div id="animation-result"></div>

    <!-- jQuery -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>

    <script>
      // Movie Question
      $("#movie-form").on("submit", function (event) {
        event.preventDefault();
        var answer = $("#movie-answer").val();
        $("#movie-text").text(answer === "movie1" ? "YESSSS!" : "Try Again!");
      });

      // Book Question
      $("#book-form").on("submit", function (event) {
        event.preventDefault();
        var answer = $("#book-answer").val();
        $("#book-text").text(answer === "book1" ? "YESSSS!" : "Try Again!");
      });

      // Standard Animation
      $("#standard-form").on("submit", function (event) {
        event.preventDefault();
        var anim = $("#standard-animation").val();
        $("#animation-result")
          .removeClass()
          .addClass(anim)
          .text(anim ? "Standard animation applied!" : "Choose an animation!");
      });

      // Custom Animation
      $("#custom-form").on("submit", function (event) {
        event.preventDefault();
        var anim = $("#custom-animation").val();
        $("#image-row")
          .removeClass()
          .addClass(anim);
      });
